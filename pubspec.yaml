name: localai_assistant
description: "LocalAI Assistant — تطبيق AI مساعد محلي يجمع بين المحادثة ووكيل الأدوات مع دعم النماذج المحلية المجانية."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ───────── UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # ───────── State Management
  provider: ^6.1.2

  # ───────── Networking & AI
  http: ^1.2.1
  dio: ^5.4.3+1
  web_socket_channel: ^2.4.5

  # ───────── Storage
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # ───────── Markdown & Code Highlight
  flutter_markdown: ^0.7.2+1
  markdown: ^7.2.2
  flutter_highlighter: ^0.1.1
  url_launcher: ^6.2.6

  # ───────── Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid_type: ^2.0.0

  # ───────── Agent Tools
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  # ملاحظة: خط Cairo يُحمّل تلقائياً عبر google_fonts package
  # لا حاجة لملفات خطوط محلية
